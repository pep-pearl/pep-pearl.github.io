<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Peppearl은 디자인 시스템, 확장 가능한 아키텍처, AI Agent Workflow로 제품의 완성도를 높이는 프론트엔드 개발자입니다."
    />
    <meta name="theme-color" content="#f6f8f4" />
    <title>Peppearl · Frontend Engineer</title>
    <script>
      ;(() => {
        const storedTheme = window.localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const theme = storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : prefersDark ? 'dark' : 'light'

        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
